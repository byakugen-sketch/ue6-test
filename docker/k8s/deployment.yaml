apiVersion: apps/v1
kind: Deployment
metadata:
  name: ue5-gameserver
  labels:
    app: ue5-gameserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ue5-gameserver
  template:
    metadata:
      labels:
        app: ue5-gameserver
    spec:
      containers:
        - name: gameserver
          image: uzumaki420/ue5-gameserver:latest
          ports:
            - containerPort: 7777
              protocol: UDP
            - containerPort: 15000
              protocol: TCP
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            tcpSocket:
              port: 15000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 7777
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
